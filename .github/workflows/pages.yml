name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export Web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_BUILD_TIME: $(date +%s)
          EXPO_PUBLIC_BASE_URL: /echo

      - name: Create echo.js for bundle update check
        run: |
          JS_PATH=$(grep -oE '_expo/static/js/web/[^"]+\.js' dist/index.html | head -n 1)
          if [ -n "$JS_PATH" ]; then
            cp "dist/$JS_PATH" dist/echo.js
          else
            find dist/_expo/static/js/web -name "*.js" -exec cp {} dist/echo.js \;
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
